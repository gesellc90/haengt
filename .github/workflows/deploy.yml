# Deployment-Workflow für Hängt! – Jeder Strich zählt!
#
# Trigger: Push eines SemVer-Tags vMAJOR.MINOR.PATCH (z. B. v0.1.0, v1.2.3).
#
# Ablauf (siehe docs/DEPLOYMENT.md):
#   build:  Frontend + Backend frisch bauen, Tarball mit dist + Source-Manifests
#           hochladen. better-sqlite3 wird im deploy-Job auf ARM neu kompiliert.
#   deploy: Auf Pi via self-hosted Runner:
#             1) Aktuellen Symlink für Rollback merken
#             2) DB-Backup nach /var/backups/getraenke/<tag>-<ts>.sqlite
#             3) Release-Verzeichnis anlegen, Tarball entpacken
#             4) `npm ci --omit=dev` (kompiliert better-sqlite3 nativ)
#             5) Migrationen ausführen (als App-User getraenke)
#             6) Symlink atomar swappen
#             7) Service neu starten (sudo systemctl restart)
#             8) Smoke-Test gegen /api/v1/health (5× retry)
#             9) Bei Fehler NACH Swap: Rollback auf vorherigen Symlink + Restart
#            10) Aufräumen: letzte 5 Releases behalten

name: Deploy

on:
  push:
    tags:
      - 'v*.*.*'

# Mehrere Deploys nicht parallel laufen lassen, aber auch nicht
# gegenseitig abbrechen — wir wollen das ältere zu Ende fahren.
concurrency:
  group: deploy-${{ github.workflow }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  NODE_VERSION: '20'
  APP_DIR: /opt/getraenke
  BACKUP_DIR: /var/backups/getraenke
  HEALTH_URL: http://localhost:3001/api/v1/health

jobs:
  # ---------------------------------------------------------------------------
  # 1) Build auf ubuntu-latest. Frisches Build, kein CI-Artefakt-Reuse — der
  #    Workflow ist damit self-contained und unabhängig von der ci.yml-Retention.
  # ---------------------------------------------------------------------------
  build:
    name: Build (ubuntu-latest)
    runs-on: ubuntu-latest
    outputs:
      artifact-name: ${{ steps.pack.outputs.artifact-name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Node ${{ env.NODE_VERSION }} einrichten
        uses: actions/setup-node@v7
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Dependencies installieren
        run: npm ci

      - name: Backend bauen (tsc)
        run: npm run build --workspace=backend

      - name: Frontend bauen (vite)
        run: npm run build --workspace=frontend

      - name: Release-Tarball packen
        id: pack
        run: |
          set -euo pipefail
          NAME="release-${GITHUB_REF_NAME}.tar.gz"
          # Wir packen NUR Source-Manifests + dist/ — node_modules werden auf
          # dem Pi neu installiert, damit better-sqlite3 ARM-nativ kompiliert wird.
          tar -czf "$NAME" \
            --owner=0 --group=0 \
            backend/dist \
            backend/package.json \
            frontend/dist \
            package.json \
            package-lock.json \
            scripts/deploy-migrate.sh
          ls -lh "$NAME"
          echo "artifact-name=$NAME" >> "$GITHUB_OUTPUT"

      - name: Artefakt hochladen
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.pack.outputs.artifact-name }}
          path: ${{ steps.pack.outputs.artifact-name }}
          if-no-files-found: error
          retention-days: 30

  # ---------------------------------------------------------------------------
  # 2) Deploy auf den Pi. Läuft als Runner-User getraenke-runner (siehe
  #    docs/DEPLOYMENT.md und scripts/getraenke-deploy.sudoers).
  # ---------------------------------------------------------------------------
  deploy:
    name: Deploy (Pi)
    needs: build
    runs-on: [self-hosted, raspberry-pi]
    environment:
      name: production
      url: ${{ env.HEALTH_URL }}
    env:
      TAG: ${{ github.ref_name }}
      ARTIFACT: ${{ needs.build.outputs.artifact-name }}
      RELEASES_DIR: /opt/getraenke/releases
      CURRENT_LINK: /opt/getraenke/current
      DB_PATH: /var/lib/getraenke/getraenke.db
    steps:
      - name: Artefakt herunterladen
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.ARTIFACT }}
          path: /tmp/deploy

      - name: Aktuellen Symlink-Stand merken (Rollback-Anker)
        id: snapshot
        run: |
          set -euo pipefail
          if [[ -L "$CURRENT_LINK" ]]; then
            PREVIOUS=$(readlink -f "$CURRENT_LINK")
          else
            PREVIOUS=""
          fi
          echo "previous=$PREVIOUS" >> "$GITHUB_OUTPUT"
          echo "Vorheriges Release: ${PREVIOUS:-<keines (Initial-Deploy)>}"

      - name: DB-Backup
        run: |
          set -euo pipefail
          mkdir -p "$BACKUP_DIR"
          if [[ ! -f "$DB_PATH" ]]; then
            echo "Keine bestehende DB unter $DB_PATH — überspringe Backup."
            exit 0
          fi
          STAMP=$(date -u +"%Y%m%dT%H%M%SZ")
          DEST="$BACKUP_DIR/$TAG-$STAMP.sqlite"
          # Hot-Backup via SQLite-eigene API (WAL-sicher, weiter beschreibbar).
          sqlite3 "$DB_PATH" ".backup '$DEST'"
          echo "Backup: $DEST ($(du -h "$DEST" | cut -f1))"

      - name: Release entpacken
        id: release
        run: |
          set -euo pipefail
          RELEASE_DIR="$RELEASES_DIR/$TAG"
          if [[ -d "$RELEASE_DIR" ]]; then
            echo "Release-Verzeichnis existiert (Re-Deploy) — entferne es."
            rm -rf "$RELEASE_DIR"
          fi
          mkdir -p "$RELEASE_DIR"
          tar -xzf "/tmp/deploy/$ARTIFACT" -C "$RELEASE_DIR"
          chmod +x "$RELEASE_DIR/scripts/deploy-migrate.sh"
          echo "release-dir=$RELEASE_DIR" >> "$GITHUB_OUTPUT"

      - name: Produktions-Dependencies installieren (better-sqlite3 ARM-Build)
        working-directory: ${{ steps.release.outputs.release-dir }}
        run: npm ci --omit=dev --workspace=backend --include-workspace-root=false

      - name: Migrationen ausführen (als App-User getraenke)
        run: ${{ steps.release.outputs.release-dir }}/scripts/deploy-migrate.sh ${{ steps.release.outputs.release-dir }}

      - name: Symlink atomar swappen
        id: swap
        run: |
          set -euo pipefail
          NEW_LINK="$CURRENT_LINK.new"
          ln -sfn "${{ steps.release.outputs.release-dir }}" "$NEW_LINK"
          # `mv -T` ist atomic-rename und dereferenziert den Symlink nicht.
          mv -Tf "$NEW_LINK" "$CURRENT_LINK"
          echo "swapped=true" >> "$GITHUB_OUTPUT"
          echo "Symlink: $CURRENT_LINK → $(readlink -f "$CURRENT_LINK")"

      - name: Service neu starten
        run: |
          set -euo pipefail
          sudo /usr/bin/systemctl restart getraenke.service
          for i in 1 2 3 4 5; do
            if sudo /usr/bin/systemctl is-active --quiet getraenke.service; then
              echo "Service aktiv (Versuch $i)."
              exit 0
            fi
            sleep 2
          done
          echo "Service nicht aktiv nach 10 s." >&2
          exit 1

      - name: Smoke-Test (/api/v1/health)
        id: smoke
        run: |
          set -euo pipefail
          for i in 1 2 3 4 5; do
            if curl -fsS --max-time 10 "$HEALTH_URL" > /tmp/health.json; then
              echo "Health-Check OK (Versuch $i):"
              cat /tmp/health.json
              exit 0
            fi
            echo "Versuch $i fehlgeschlagen, retry in 2 s …"
            sleep 2
          done
          echo "Smoke-Test fehlgeschlagen nach 5 Versuchen." >&2
          exit 1

      - name: Rollback bei Deploy-Fehler nach Symlink-Swap
        if: failure() && steps.swap.outputs.swapped == 'true'
        env:
          PREVIOUS: ${{ steps.snapshot.outputs.previous }}
        run: |
          set -euo pipefail
          if [[ -z "$PREVIOUS" ]]; then
            echo "Kein vorheriges Release vorhanden — manueller Eingriff nötig." >&2
            exit 1
          fi
          echo "ROLLBACK auf $PREVIOUS"
          ln -sfn "$PREVIOUS" "$CURRENT_LINK.rollback"
          mv -Tf "$CURRENT_LINK.rollback" "$CURRENT_LINK"
          sudo /usr/bin/systemctl restart getraenke.service
          echo "Rollback abgeschlossen — Workflow wird trotzdem rot abgeschlossen."
          exit 1

      - name: Alte Releases aufräumen (letzte 5 behalten)
        if: success()
        run: |
          set -euo pipefail
          cd "$RELEASES_DIR"
          KEEP=5
          ACTIVE=$(basename "$(readlink -f "$CURRENT_LINK")")
          mapfile -t OLD < <(ls -1dt v*/ 2>/dev/null | tail -n +$((KEEP + 1)))
          if [[ ${#OLD[@]} -eq 0 ]]; then
            echo "Nichts zu löschen — ≤ $KEEP Releases vorhanden."
            exit 0
          fi
          for d in "${OLD[@]}"; do
            name="${d%/}"
            if [[ "$name" == "$ACTIVE" ]]; then
              echo "Übersprungen (= aktiv): $name"
              continue
            fi
            echo "Lösche altes Release: $name"
            rm -rf "${RELEASES_DIR:?}/$name"
          done
