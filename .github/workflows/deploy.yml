# Deployment-Workflow für Hängt! – Jeder Strich zählt!
#
# Trigger: Push eines SemVer-Tags vMAJOR.MINOR.PATCH (z. B. v0.1.0, v1.2.3).
#
# Ablauf (siehe docs/DEPLOYMENT.md):
#   build:  Frontend + Backend frisch bauen, Tarball mit dist + Source-Manifests
#           hochladen. better-sqlite3 wird im deploy-Job auf ARM neu kompiliert.
#           Zusätzlich wird der Tarball als Release-Asset an das Tag angehängt,
#           damit der Auto-Update-Helper auf dem Pi (M14) ihn ohne
#           Actions-Zugriff herunterladen kann.
#   deploy: Auf Pi via self-hosted Runner ruft `scripts/pi-release.sh` auf
#           (Backup, Entpacken, npm ci, Migrationen, atomarer Symlink-Swap,
#           Neustart, Smoke-Test, Rollback bei Fehler, Aufräumen — siehe
#           Kommentar-Header dort). Derselbe Skript-Pfad wird vom
#           Auto-Update-Helper (scripts/pi-self-update.sh) wiederverwendet.

name: Deploy

on:
  push:
    tags:
      - 'v*.*.*'

# Mehrere Deploys nicht parallel laufen lassen, aber auch nicht
# gegenseitig abbrechen — wir wollen das ältere zu Ende fahren.
concurrency:
  group: deploy-${{ github.workflow }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  NODE_VERSION: '20'
  APP_DIR: /opt/getraenke
  BACKUP_DIR: /var/backups/getraenke
  HEALTH_URL: http://localhost:3001/api/v1/health

jobs:
  # ---------------------------------------------------------------------------
  # 1) Build auf ubuntu-latest. Frisches Build, kein CI-Artefakt-Reuse — der
  #    Workflow ist damit self-contained und unabhängig von der ci.yml-Retention.
  # ---------------------------------------------------------------------------
  build:
    name: Build (ubuntu-latest)
    runs-on: ubuntu-latest
    permissions:
      contents: write # nötig für den Release-Asset-Upload weiter unten
    outputs:
      artifact-name: ${{ steps.pack.outputs.artifact-name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Node ${{ env.NODE_VERSION }} einrichten
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Dependencies installieren
        run: npm ci

      - name: Backend bauen (tsc)
        run: npm run build --workspace=backend

      - name: Frontend bauen (vite)
        run: npm run build --workspace=frontend

      - name: Release-Tarball packen
        id: pack
        run: |
          set -euo pipefail
          NAME="release-${GITHUB_REF_NAME}.tar.gz"
          # Wir packen NUR Source-Manifests + dist/ — node_modules werden auf
          # dem Pi neu installiert, damit better-sqlite3 ARM-nativ kompiliert wird.
          tar -czf "$NAME" \
            --owner=0 --group=0 \
            backend/dist \
            backend/package.json \
            frontend/dist \
            package.json \
            package-lock.json \
            scripts/deploy-migrate.sh \
            scripts/pi-release.sh \
            scripts/pi-self-update.sh
          ls -lh "$NAME"
          echo "artifact-name=$NAME" >> "$GITHUB_OUTPUT"

      - name: Artefakt hochladen
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.pack.outputs.artifact-name }}
          path: ${{ steps.pack.outputs.artifact-name }}
          if-no-files-found: error
          retention-days: 30

      - name: Als GitHub-Release-Asset veröffentlichen
        # Macht den Tarball unabhängig von der 30-Tage-Actions-Artefakt-Retention
        # dauerhaft abrufbar — Voraussetzung für den Pi-lokalen Auto-Update-Helper
        # (scripts/pi-self-update.sh, M14), der Actions-Artefakte nicht ohne
        # Weiteres herunterladen kann, wohl aber Release-Assets.
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: ${{ steps.pack.outputs.artifact-name }}
          generate_release_notes: true
          fail_on_unmatched_files: true

  # ---------------------------------------------------------------------------
  # 2) Deploy auf den Pi. Läuft als Runner-User getraenke-runner (siehe
  #    docs/DEPLOYMENT.md und scripts/getraenke-deploy.sudoers).
  # ---------------------------------------------------------------------------
  deploy:
    name: Deploy (Pi)
    needs: build
    runs-on: [self-hosted, raspberry-pi]
    environment:
      name: production
      url: ${{ env.HEALTH_URL }}
    env:
      TAG: ${{ github.ref_name }}
      ARTIFACT: ${{ needs.build.outputs.artifact-name }}
      RELEASES_DIR: /opt/getraenke/releases
      CURRENT_LINK: /opt/getraenke/current
      DB_PATH: /var/lib/getraenke/getraenke.db
    steps:
      - name: Artefakt herunterladen
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.ARTIFACT }}
          path: /tmp/deploy

      - name: pi-release.sh aus dem Tarball ziehen
        # Das Skript selbst steckt im Tarball (es entpackt sich also gewissermaßen
        # selbst) — wir brauchen einen ausführbaren Erststand, bevor es den Rest
        # (inkl. sich selbst) ins Release-Verzeichnis entpackt.
        run: tar -xzf "/tmp/deploy/$ARTIFACT" -C /tmp/deploy scripts/pi-release.sh

      - name: Release installieren (Backup, Swap, Migrationen, Smoke-Test, Rollback)
        # BACKUP_DIR und HEALTH_URL kommen aus dem workflow-weiten env-Block oben;
        # RELEASES_DIR, CURRENT_LINK, DB_PATH aus dem job-weiten env-Block.
        run: /tmp/deploy/scripts/pi-release.sh "/tmp/deploy/$ARTIFACT" "$TAG"
